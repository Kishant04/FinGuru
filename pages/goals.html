<!-- MAIN CONTENT -->
<div class="container mt-4">

  <h2 class="mb-4">Financial Goals</h2>

  <div class="row g-3">

    <!-- Add Goal Form -->
    <div class="col-lg-4">
      <div class="card h-100">
        <div class="card-body">
          <h5>Add New Goal</h5>
          <form id="goalForm">
            <div class="mb-3">
              <label class="form-label">Goal Name</label>
              <input type="text" class="form-control" id="goalName" placeholder="e.g. Buy House">
            </div>
            <div class="mb-3">
              <label class="form-label">Target Amount (RM)</label>
              <input type="number" class="form-control" id="goalTarget" placeholder="e.g. 100000" min="0" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Saved Amount (RM)</label>
              <input type="number" class="form-control" id="goalSaved" placeholder="e.g. 30000" min="0" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Add Goal</button>
            <div id="goalAlert" class="mt-3"></div>
          </form>
        </div>
      </div>
    </div>

    <!-- RIGHT: Goals Table -->
    <div class="col-lg-8">
      <div class="card h-100">
        <div class="card-body">
          <h5>Your Goals</h5>
          <div class="table-responsive">
            <table class="table table-bordered mt-3">
              <thead class="table-dark">
                <tr>
                  <th>Name</th>
                  <th>Target</th>
                  <th>Saved</th>
                  <th>Progress</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="goalTableBody">
                <!-- Filled by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
