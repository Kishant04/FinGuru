      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">

<!-- MAIN CONTENT -->
<div class="container mt-4">

  <h2 class="mb-4">Financial Goals</h2>

  <!-- ADD GOAL FORM -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Add New Goal</h5>

      <form id="GoalForm">
        <div class="mb-3">
          <label class="form-label">Goal Name</label>
          <input type="text" class="form-control" placeholder="e.g. Buy House">
        </div>

        <div class="mb-3">
          <label class="form-label">Target Amount (RM)</label>
          <input type="number" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Saved Amount (RM)</label>
          <input type="number" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">Add Goal</button>
      </form>
    </div>
  </div>

  <!-- GOALS TABLE -->
  <div class="card">
    <div class="card-body">
      <h5>Your Goals</h5>

      <table class="table table-bordered mt-3">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Target</th>
            <th>Saved</th>
            <th>Progress</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>Buy House (placeholder)</td>
            <td>500,000 (placeholder)</td>
            <td>300,000</td>
            <td>
            <div class="progress">
              <div class="progress-bar bg-success" style="width: 60%;">
                60%
                </div>
              </div>
            </td>
          </tr>
        </tbody>

      </table>
    </div>
  </div>

</div>
