<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password | FinGuru</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html">FinGuru</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="goals.html">Goals</a></li>
        <li class="nav-item"><a class="nav-link" href="roi-calculator.html">ROI</a></li>
        <li class="nav-item"><a class="nav-link" href="investment-recommendation.html">Invest</a></li>
        <li class="nav-item"><a class="nav-link" href="market-insights.html">Markets</a></li>
        <li class="nav-item ms-lg-2"><a class="nav-link profile-link" href="profile.html">Profile</a></li>
        <li class="nav-item ms-lg-2"><a class="nav-link btn btn-outline-light btn-sm" href="#" id="logoutLink">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card p-4 shadow-sm">
        <h4 class="mb-4">Change Password</h4>
        <div id="changePasswordAlert"></div>
        <form id="changePasswordForm" novalidate>
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" class="form-control" id="currentPassword" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" id="newPassword" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" id="confirmNewPassword" required>
          </div>
          <button type="submit" class="btn btn-primary">Update Password</button>
          <a class="btn btn-secondary ms-2" href="profile.html">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="../js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
