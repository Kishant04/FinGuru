<!-- MAIN CONTENT -->
<div class="container mt-5">

  <div class="mb-5">

    <h2>Investment Recommendation</h2>

    <p class="text-muted">
      Personalized investment suggestions based on your risk profile.
    </p>

  </div>

  <!-- CURRENT RISK -->
  <div class="card shadow-sm p-4 mb-5">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

      <div>
        <h5>Your Current Risk Level</h5>

        <p class="text-muted mb-0">
          Recommendations are generated from your risk profiling quiz.
        </p>
      </div>

      <span class="badge bg-primary fs-6 px-4 py-2" id="riskBadge">
        Moderate
      </span>

    </div>

  </div>

  <!-- RECOMMENDATION AREA -->
  <div class="row g-4" id="recommendationContainer">

  </div>

</div>

<script src="../js/app.js"></script>

<script>

const riskLevel = localStorage.getItem("riskLevel") || "Moderate";

document.getElementById("riskBadge").textContent = riskLevel;

const recommendationContainer = document.getElementById("recommendationContainer");

let recommendationHTML = "";


// ====================================
// CONSERVATIVE
// ====================================

if (riskLevel === "Conservative") {

  recommendationHTML = `

    <div class="col-lg-4">
      <div class="card recommendation-card h-100 shadow-sm p-4">

        <h4 class="mb-3">Fixed Deposits</h4>

        <p class="text-muted">
          Low-risk savings option with stable guaranteed returns.
        </p>

        <ul>
          <li>Safe investment</li>
          <li>Stable returns</li>
          <li>Low volatility</li>
        </ul>

        <button class="btn btn-primary mt-auto">
          Learn More
        </button>

      </div>
    </div>

    <div class="col-lg-4">
      <div class="card recommendation-card h-100 shadow-sm p-4">

        <h4 class="mb-3">Government Bonds</h4>

        <p class="text-muted">
          Secure long-term investment backed by governments.
        </p>

        <ul>
          <li>Consistent income</li>
          <li>Very low risk</li>
          <li>Long-term stability</li>
        </ul>

        <button class="btn btn-primary mt-auto">
          Learn More
        </button>

      </div>
    </div>

    <div class="col-lg-4">
      <div class="card recommendation-card h-100 shadow-sm p-4">

        <h4 class="mb-3">Money Market Funds</h4>

        <p class="text-muted">
          Suitable for emergency savings and capital preservation.
        </p>

        <ul>
          <li>Easy liquidity</li>
          <li>Lower returns</li>
          <li>Safe investment</li>
        </ul>

        <button class="btn btn-primary mt-auto">
          Learn More
        </button>

      </div>
    </div>

  `;
}


// ====================================
// MODERATE
// ====================================

else if (riskLevel === "Moderate") {

  recommendationHTML = `

    <div class="col-lg-4">
      <div class="card recommendation-card h-100 shadow-sm p-4">

        <h4 class="mb-3">Unit Trust Funds</h4>

        <p class="text-muted">
          Diversified investments managed by professionals.
        </p>

        <ul>
          <li>Balanced risk</li>
          <li>Professional management</li>
          <li>Long-term growth</li>
        </ul>

        <button class="btn btn-primary mt-auto">
          Learn More
        </button>

      </div>
    </div>

    <div class="col-lg-4">
      <div class="card recommendation-card h-100 shadow-sm p-4">

        <h4 class="mb-3">Dividend Stocks</h4>

        <p class="text-muted">
          Earn regular dividends while growing your capital.
        </p>

        <ul>
          <li>Passive income</li>
          <li>Moderate volatility</li>
          <li>Growth potential</li>
        </ul>

        <button class="btn btn-primary mt-auto">
          Learn More
        </button>

      </div>
    </div>

    <div class="col-lg-4">
      <div class="card recommendation-card h-100 shadow-sm p-4">

        <h4 class="mb-3">REITs</h4>

        <p class="text-muted">
          Invest in property markets without buying real estate directly.
        </p>

        <ul>
          <li>Real estate exposure</li>
          <li>Dividend income</li>
          <li>Balanced returns</li>
        </ul>

        <button class="btn btn-primary mt-auto">
          Learn More
        </button>

      </div>
    </div>

  `;
}


// ====================================
// AGGRESSIVE
// ====================================

else {

  recommendationHTML = `

    <div class="col-lg-4">
      <div class="card recommendation-card h-100 shadow-sm p-4">

        <h4 class="mb-3">Growth Stocks</h4>

        <p class="text-muted">
          High growth potential with higher market volatility.
        </p>

        <ul>
          <li>High returns</li>
          <li>Higher risk</li>
          <li>Long-term growth</li>
        </ul>

        <button class="btn btn-primary mt-auto">
          Learn More
        </button>

      </div>
    </div>

    <div class="col-lg-4">
      <div class="card recommendation-card h-100 shadow-sm p-4">

        <h4 class="mb-3">Cryptocurrency</h4>

        <p class="text-muted">
          Digital assets with strong growth opportunities and volatility.
        </p>

        <ul>
          <li>Very high risk</li>
          <li>High volatility</li>
          <li>Potentially high returns</li>
        </ul>

        <button class="btn btn-primary mt-auto">
          Learn More
        </button>

      </div>
    </div>

    <div class="col-lg-4">
      <div class="card recommendation-card h-100 shadow-sm p-4">

        <h4 class="mb-3">Tech Stocks</h4>

        <p class="text-muted">
          Invest in fast-growing technology companies globally.
        </p>

        <ul>
          <li>Innovation focused</li>
          <li>Higher market swings</li>
          <li>Strong future growth</li>
        </ul>

        <button class="btn btn-primary mt-auto">
          Learn More
        </button>

      </div>
    </div>

  `;
}

recommendationContainer.innerHTML = recommendationHTML;

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
