<div class="container mt-5">

  <div class="row g-4">
    <div class="col-lg-6">
      <div class="card p-4 shadow-sm">
        <h3 class="mb-4">ROI Calculator</h3>

        <form id="roiForm">
          <div class="mb-3">
            <label>Initial Investment (RM)</label>
            <input type="number" class="form-control" id="initialInvestment" required>
          </div>

          <div class="mb-3">
            <label>Final Value (RM)</label>
            <input type="number" class="form-control" id="finalValue" required>
          </div>

          <button class="btn btn-primary w-100" type="submit">
            Calculate ROI
          </button>
        </form>
        <div class="mt-4">
          <h5>ROI Result</h5>
          <p id="roiResult">0%</p>
        </div>
      </div>
    </div>

    <div class="col-lg-6">
      <div class="card p-4 shadow-sm">
        <h3 class="mb-4">Compound Interest Calculator</h3>

        <form id="compoundForm">

          <div class="mb-3">
            <label>Principal Amount (RM)</label>
            <input type="number" class="form-control" id="principal" required>
          </div>

          <div class="mb-3">
            <label>Annual Interest Rate (%)</label>
            <input type="number" class="form-control" id="interestRate" required>
          </div>
          <div class="mb-3">
            <label>Years</label>
            <input type="number" class="form-control" id="years" required>
          </div>

          <button class="btn btn-success w-100" type="submit">
            Calculate Growth
          </button>
        </form>

        <div class="mt-4">
          <h5>Future Value</h5>
          <p id="compoundResult">RM 0</p>
        </div>
      </div>
    </div>

  </div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
